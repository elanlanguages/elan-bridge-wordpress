name: Release

# Cut a release by pushing a semver tag, e.g.:
#   git tag -a v0.2.0 -m "v0.2.0" && git push origin v0.2.0
# The job verifies the plugin header version matches the tag, builds a clean
# installable zip, and publishes it as a GitHub Release asset. The plugin's
# self-updater (GitHubReleaseUpdater) then offers it to installed sites.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build + publish plugin zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip (header version must match the tag)
        run: bash bin/build-plugin-zip.sh --expect "${{ steps.ver.outputs.version }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/elan-bridge.zip" \
            --title "ELAN AI Bridge ${GITHUB_REF_NAME}" \
            --generate-notes
